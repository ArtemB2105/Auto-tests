[pytest]
# Ensure pytest treats project_YT as the root package and avoids
# importing modules from a duplicate path under "Auto-tests".
# Running tests from workspace root previously caused ImportPathMismatchError.
# By specifying testpaths and pythonpath we can invoke pytest from anywhere.

# directory where tests are located
testpaths = project_YT/tests

# add the package root so imports resolve consistently
pythonpath = project_YT

# optionally, you could also set "rootdir = project_YT" but pytest
# autodetects based on testpaths when invoked from workspace root.
